name: black_theory
description: "Pwned GreenTheory mobile application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Design
  cupertino_icons: ^1.0.8

  # Environment
  flutter_dotenv: ^5.2.1

  # QR code
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0

  # Launcher icons
  flutter_launcher_icons: "^0.14.3"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21